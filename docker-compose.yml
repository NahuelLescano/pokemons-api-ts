services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-pokemon}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pokemon}
      POSTGRES_DB: ${DB_NAME:-pokemondb}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pokemon} -d ${DB_NAME:-pokemondb}"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    ports:
      - "${PORT:-4000}:4000"
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-pokemon}
      DB_PASSWORD: ${DB_PASSWORD:-pokemon}
      DB_NAME: ${DB_NAME:-pokemondb}
      PORT: ${PORT:-4000}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
